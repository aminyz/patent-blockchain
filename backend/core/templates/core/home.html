<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم ثبت اختراع بلاک‌چین</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .blockchain-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        .links {
            margin-top: 30px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            color: white;
        }
        .btn:hover {
            transform: translateY(-3px);
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .btn-verify {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="blockchain-icon">⛓️</div>
        <h1>سیستم ثبت اختراع بلاک‌چین</h1>
        <p>ثبت امن و غیرقابل تغییر اختراعات با استفاده از فناوری بلاک‌چین</p>

        <div class="links">
            <a href="{% url 'register' %}" class="btn btn-register">📝 ثبت سند جدید</a>
            <a href="{% url 'verify' %}" class="btn btn-verify">🔍 استعلام سند</a>
        </div>
    </div>
</body>
</html>
